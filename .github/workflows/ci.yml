name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission to mvnw
        working-directory: invernadero
        run: chmod +x mvnw

      - name: Run backend tests
        working-directory: invernadero
        run: ./mvnw test
      - name: Package backend
        working-directory: invernadero
        run: ./mvnw package -DskipTests
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: invernadero/target/*.jar

  frontend-testing:
    runs-on: ubuntu-latest
    needs: [backend-testing]  

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: invernaderoeis
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Joseph.0603
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: invernadero/target/

      - name: Run backend
        working-directory: invernadero
        run: |
          java -jar target/*.jar \
            --spring.profiles.active=test \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/invernaderoeis \
            --spring.datasource.username=postgres \
            --spring.datasource.password=Joseph.0603 \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend started with PID: $(cat backend.pid)"
          
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: invernadero-frontend
        run: npm install

      - name: Build frontend
        working-directory: invernadero-frontend
        run: npm run build

      - name: Start frontend preview
        working-directory: invernadero-frontend
        run: npm run preview &

      - name: Wait for frontend
        run: npx wait-on http://localhost:4173

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        working-directory: invernadero-frontend
        run: npm run test
        env:
          VITE_API_URL: http://localhost:8080
  
  notify-taiga:
    runs-on: ubuntu-latest
    needs: [backend-testing, frontend-testing]
    if: always() && (needs.backend-testing.result == 'failure' || needs.frontend-testing.result == 'failure')
 
    steps:
      - name: Install dependencies (jq)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Get Taiga Auth Token
        id: taiga_auth
        run: |
          RESPONSE=$(curl -s -X POST "https://api.taiga.io/api/v1/auth" \
            -H "Content-Type: application/json" \
            -d '{"type": "normal", "username": "JOGUMA", "password": "Joseph.0603"}')

          TOKEN=$(echo $RESPONSE | jq -r '.auth_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to authenticate with Taiga"
            echo "$RESPONSE"
            exit 1
          fi

          echo "TAIGA_TOKEN=$TOKEN" >> $GITHUB_ENV
      - name: Create Automated Bug in Taiga
        env:
          PROJECT_ID: ${{ secrets.TAIGA_PROJECT_ID }}
          STATUS_ID: ${{ secrets.TAIGA_STATUS_ID }}
          TYPE_ID: ${{ secrets.TAIGA_TYPE_ID }}
          PRIORITY_ID: ${{ secrets.TAIGA_PRIORITY_ID }}
          SEVERITY_ID: ${{ secrets.TAIGA_SEVERITY_ID }}
        run: |
          curl --fail -X POST "https://api.taiga.io/api/v1/issues" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $TAIGA_TOKEN" \
          -d "{
            \"project\": $PROJECT_ID,
            \"status\": $STATUS_ID,
            \"type\": $TYPE_ID,
            \"priority\": $PRIORITY_ID,
            \"severity\": $SEVERITY_ID,
            \"subject\": \"CI FAILED - Pruebas fallidas\",
            \"description\": \"Automated CI/CD bug detected.\",
            \"tags\": [\"github-actions\",\"ci-cd\",\"automated-bug\"]
          }"