version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: invernadero_database
    environment:
      POSTGRES_DB: invernaderoeis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Joseph.0603
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - contendor_invernadero

  backend:
    build:
      context: ./invernadero
      dockerfile: Dockerfile.dev
    container_name: invernadero_backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/invernaderoeis
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Joseph.0603
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    volumes:
      - ./invernadero:/app
      - maven_cache:/root/.m2
    command: mvn spring-boot:run -Dspring-boot.run.fork=false
    networks:
      - contendor_invernadero

  frontend:
    build:
      context: ./invernadero-frontend
      dockerfile: Dockerfile.dev
    container_name: invernadero_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./invernadero-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps --include=optional && npm run dev -- --host 0.0.0.0"
    networks:
      - contendor_invernadero

volumes:
  postgres_data:
  frontend_node_modules:
  maven_cache:

networks:
  contendor_invernadero:
    driver: bridge